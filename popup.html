<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DualView Translator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: light dark;
      --bg: #0c0c18;
      --bg2: #14141f;
      --bg3: #1c1c2e;
      --border: rgba(255,255,255,0.08);
      --accent: #e8950e;
      --accent-dim: rgba(245,166,35,0.15);
      --accent-text: #0c0c18;
      --text: #e8e8f0;
      --muted: rgba(232,232,240,0.5);
      --radius: 10px;
      --btn-hover: #ffbb40;
      --btn-sec-hover-bg: rgba(255,255,255,0.06);
      --btn-sec-hover-border: rgba(255,255,255,0.15);
      --dot-idle: rgba(255,255,255,0.2);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --bg2: #f5f5f7;
        --bg3: #ecedf0;
        --border: rgba(0,0,0,0.1);
        --accent: #d4870a;
        --accent-dim: rgba(212,135,10,0.12);
        --accent-text: #ffffff;
        --text: #1a1a2e;
        --muted: rgba(26,26,46,0.5);
        --btn-hover: #e8950e;
        --btn-sec-hover-bg: rgba(0,0,0,0.04);
        --btn-sec-hover-border: rgba(0,0,0,0.18);
        --dot-idle: rgba(0,0,0,0.15);
      }
    }

    /* JSフォールバック: Firefox等でメディアクエリが効かない場合 */
    :root.dvt-light {
      --bg: #ffffff;
      --bg2: #f5f5f7;
      --bg3: #ecedf0;
      --border: rgba(0,0,0,0.1);
      --accent: #d4870a;
      --accent-dim: rgba(212,135,10,0.12);
      --accent-text: #ffffff;
      --text: #1a1a2e;
      --muted: rgba(26,26,46,0.5);
      --btn-hover: #e8950e;
      --btn-sec-hover-bg: rgba(0,0,0,0.04);
      --btn-sec-hover-border: rgba(0,0,0,0.18);
      --dot-idle: rgba(0,0,0,0.15);
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, 'Hiragino Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      /* PNG マスターアイコンが既に角丸オレンジ背景 + シンボルを含むため、
         ここでは追加の装飾はしない */
    }

    .logo img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .brand {
      flex: 1;
    }

    .brand-name {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    .brand-sub {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Section ── */
    .section {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    /* ── Language Selector ── */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lang-label {
      font-size: 11.5px;
      color: var(--muted);
      min-width: 42px;
    }

    .dvt-api-key-wrap {
      position: relative;
      flex: 1;
    }
    .dvt-api-key-wrap input {
      width: 100%;
      padding: 6px 60px 6px 10px;
      box-sizing: border-box;
    }
    .dvt-api-test-btn {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 4px;
      font-size: 10.5px;
      font-family: inherit;
      cursor: pointer;
      width: 50px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dvt-api-test-btn:hover { color: var(--text); background: var(--bg3); }
    .dvt-api-test-btn:disabled { opacity: 0.4; cursor: default; }
    .dvt-api-test-btn.dvt-test-ok { color: #22c55e; border-color: #22c55e; }
    .dvt-api-test-btn.dvt-test-ng { color: #ef4444; border-color: #ef4444; }

    select {
      flex: 1;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      appearance: auto;
    }

    select:focus { border-color: var(--accent); }
    input:focus { border-color: var(--accent) !important; }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-text);
    }

    .btn-primary:hover { background: var(--btn-hover); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--btn-sec-hover-bg); border-color: var(--btn-sec-hover-border); }
    .btn-secondary:active { transform: scale(0.98); }

    .btn-active {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(245,166,35,0.3);
    }

    .btn-active:hover { background: rgba(245,166,35,0.22); }

    .btn + .btn { margin-top: 7px; }

    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-shortcut {
      margin-left: auto;
      font-size: 9.5px;
      font-family: 'DM Mono', monospace;
      opacity: 0.45;
      letter-spacing: 0.03em;
    }

    /* iOS Safari等ショートカット非対応環境で表示を隠す */
    :root.dvt-no-shortcuts .btn-shortcut,
    :root.dvt-no-shortcuts #shortcutInfoRow { display: none !important; }

    /* ── Status ── */
    .status-bar {
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11.5px;
      color: var(--muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dot-idle);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.active { background: #4caf50; }
    .status-dot.translating {
      background: var(--accent);
      animation: pulse 1s ease infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Info ── */
    .info-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.6;
    }

    .info-box strong { color: var(--text); }

    /* ── Cache ── */
    .cache-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cache-entries {
      flex: 1;
      font-size: 11.5px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .cache-clear-btn {
      flex-shrink: 0;
      width: auto;
      padding: 6px 12px;
      font-size: 11.5px;
    }

    .cache-hit-rates {
      display: flex;
      gap: 12px;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .cache-hit-rate-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .cache-hit-rate-bar {
      display: inline-block;
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      vertical-align: middle;
    }

    .cache-hit-rate-fill {
      display: block;
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0;
    }

    /* ── Tab Bar ── */
    .dvt-tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .dvt-tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }

    .dvt-tab:hover {
      color: var(--text);
    }

    .dvt-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .dvt-tab-content {
      display: none;
    }

    .dvt-tab-content.active {
      display: block;
    }

    /* ── Version ── */
    .version {
      font-size: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-left: 6px;
      opacity: 0.7;
    }

    /* ── Auto Rules ── */
    .rule-list {
      margin-bottom: 10px;
      max-height: 160px;
      overflow-y: auto;
    }

    .rule-empty {
      font-size: 11.5px;
      color: var(--muted);
      text-align: center;
      padding: 8px 0;
    }

    .rule-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .rule-item:hover {
      border-color: var(--btn-sec-hover-border);
    }

    .rule-item.editing {
      border-color: var(--accent);
      background: var(--bg3);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .rule-item-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rule-toggle-cb {
      flex-shrink: 0;
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .rule-pattern {
      font-size: 11.5px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'DM Mono', monospace;
      flex: 1;
      min-width: 0;
    }

    .rule-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 0 2px;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.15s;
    }

    .rule-del:hover { color: #e57373; }

    .rule-item-sub {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 3px;
      padding-left: 20px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rule-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rule-input {
      flex: 1;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .rule-input:focus { border-color: var(--accent); }

    .rule-form-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .rule-mode-select {
      flex: 1;
    }

    .rule-add-btn {
      flex-shrink: 0;
      width: auto;
      padding: 8px 14px;
      font-size: 12px;
    }

    .rule-cancel-btn {
      flex-shrink: 0;
      width: auto;
      padding: 8px 12px;
      font-size: 12px;
    }

    /* ── Rule Input Row ── */
    .rule-input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .rule-input-row .rule-input {
      flex: 1;
      width: auto;
    }

    .btn-pick {
      flex-shrink: 0;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 11.5px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .btn-pick:hover {
      background: var(--btn-sec-hover-bg);
      border-color: var(--btn-sec-hover-border);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <!-- HiDPI / Retina 環境（DPR 1.5〜3.0）でぼやけないよう srcset で複数解像度を提供 -->
      <img
        src="icons/icon32.png"
        srcset="icons/icon32.png 32w, icons/icon48.png 48w, icons/icon128.png 128w"
        sizes="32px"
        alt=""
        width="32"
        height="32"
      >
    </div>
    <div class="brand">
      <div class="brand-name">DualView Translator <span class="version" id="appVersion"></span></div>
      <div class="brand-sub" data-i18n="brandSub">原文と翻訳を並べて表示</div>
    </div>
  </div>

  <!-- タブバー -->
  <div class="dvt-tab-bar">
    <button class="dvt-tab active" id="tabBtnTranslate" data-tab="tabTranslate" data-i18n="tabTranslate">翻訳</button>
    <button class="dvt-tab" id="tabBtnRules" data-tab="tabRules" data-i18n="tabRules">ルール</button>
    <button class="dvt-tab" id="tabBtnSettings" data-tab="tabSettings" data-i18n="tabSettings">設定</button>
  </div>

  <!-- 翻訳タブ -->
  <div class="dvt-tab-content active" id="tabTranslate">
    <div class="section">
      <div class="section-label" data-i18n="targetLangLabel">翻訳先の言語</div>
      <div class="lang-row">
        <span class="lang-label" data-i18n="targetLangTo">→ 翻訳先</span>
        <select id="targetLang">
          <option value="ja">🇯🇵 日本語</option>
          <option value="en">🇺🇸 English</option>
          <option value="zh-CN">🇨🇳 中文（簡体）</option>
          <option value="zh-TW">🇹🇼 中文（繁体）</option>
          <option value="ko">🇰🇷 한국어</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="es">🇪🇸 Español</option>
          <option value="pt">🇵🇹 Português</option>
          <option value="ru">🇷🇺 Русский</option>
          <option value="ar">🇸🇦 العربية</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-label" data-i18n="translateMode">翻訳モード</div>
      <button class="btn btn-primary" id="btnPage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>
        <span data-i18n="translateFullPage">ページ全体を翻訳</span>
        <span class="btn-shortcut">Ctrl+Shift+T</span>
      </button>
      <button class="btn btn-secondary" id="btnPageSummary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h6"/></svg>
        <span data-i18n="translateAndSummarize">ページ全体を翻訳＆要約</span>
      </button>
      <button class="btn btn-secondary" id="btnRegion">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
        <span data-i18n="translateRegion">領域を選択して翻訳</span>
        <span class="btn-shortcut">Ctrl+Shift+R</span>
      </button>
      <button class="btn btn-secondary" id="btnRegionSummary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><path d="M7 8h10M7 12h6"/></svg>
        <span data-i18n="translateRegionSummarize">領域を選択して翻訳＆要約</span>
      </button>
      <button class="btn btn-secondary" id="btnUndo" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 109-9H3"/><path d="M3 3v6h6"/></svg>
        <span data-i18n="translateReset">翻訳をリセット</span>
      </button>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText" data-i18n="statusDefault">テキストを選択して翻訳、またはモードを選択</span>
    </div>
  </div>

  <!-- ルールタブ -->
  <div class="dvt-tab-content" id="tabRules">
    <div class="section">
      <div class="section-label" data-i18n="autoRulesLabel">自動翻訳ルール</div>
      <!-- ルール一覧 -->
      <div id="autoRuleList" class="rule-list"></div>
      <!-- ルール追加/編集フォーム -->
      <div class="rule-form">
        <input type="text" id="ruleUrlPattern" class="rule-input" data-i18n-placeholder="autoRuleUrlPlaceholder" placeholder="*://example.com/*">
        <div class="rule-input-row">
          <input type="text" id="ruleSelector" class="rule-input" data-i18n-placeholder="autoRuleSelectorPlaceholder" placeholder="div.content">
          <button class="btn-pick" id="btnPickSelector" data-i18n="btnSelectElement">要素を選択</button>
        </div>
        <div class="rule-form-row">
          <select id="ruleMode" class="rule-mode-select">
            <option value="translate" data-i18n="autoRuleModeTranslate">翻訳のみ</option>
            <option value="summarize" data-i18n="autoRuleModeSummarize">翻訳＆要約</option>
          </select>
          <button class="btn btn-secondary rule-cancel-btn" id="btnCancelRuleEdit" data-i18n="autoRuleCancel" style="display:none">キャンセル</button>
          <button class="btn btn-primary rule-add-btn" id="btnAddRule" data-i18n="autoRuleAdd">追加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 設定タブ -->
  <div class="dvt-tab-content" id="tabSettings">
    <div class="section">
      <div class="section-label" data-i18n="uiLangLabel">表示言語</div>
      <div class="lang-row">
        <span class="lang-label">🌐</span>
        <select id="uiLang">
          <option value="ja">🇯🇵 日本語</option>
          <option value="en">🇺🇸 English</option>
          <option value="zh-CN">🇨🇳 中文（简体）</option>
          <option value="zh-TW">🇹🇼 中文（繁體）</option>
          <option value="ko">🇰🇷 한국어</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="es">🇪🇸 Español</option>
          <option value="pt">🇵🇹 Português</option>
          <option value="ru">🇷🇺 Русский</option>
          <option value="ar">🇸🇦 العربية</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-label" data-i18n="engineLabel">翻訳エンジン</div>
      <div class="lang-row">
        <span class="lang-label">⚙</span>
        <select id="translateEngine">
          <option value="google" data-i18n="engineGoogle">Google 翻訳（無料）</option>
          <option value="deepl" data-i18n="engineDeepL">DeepL（APIキー必要）</option>
        </select>
      </div>
      <div id="deeplSettings" style="display:none; margin-top: 8px;">
        <div class="lang-row">
          <span class="lang-label" data-i18n="deeplApiKeyLabel">APIキー</span>
          <div class="dvt-api-key-wrap">
            <input type="password" id="deeplApiKey" data-i18n-placeholder="deeplApiKeyPlaceholder" placeholder="APIキーを入力" style="background:var(--bg3); color:var(--text); border:1px solid var(--border); border-radius:7px; font-size:12.5px; font-family:inherit; outline:none;">
            <button class="dvt-api-test-btn" id="deeplTestBtn" data-i18n="apiKeyTest">テスト</button>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label" data-i18n="llmLabel">要約エンジン</div>
      <div class="lang-row">
        <span class="lang-label">🤖</span>
        <select id="llmEngine">
          <option value="claude" data-i18n="llmClaude">Claude（APIキー必要）</option>
          <option value="gemini" data-i18n="llmGemini">Gemini（APIキー必要）</option>
        </select>
      </div>
      <div id="claudeSettings" style="display:none; margin-top: 8px;">
        <div class="lang-row">
          <span class="lang-label" data-i18n="claudeApiKeyLabel">APIキー</span>
          <div class="dvt-api-key-wrap">
            <input type="password" id="claudeApiKey" data-i18n-placeholder="claudeApiKeyPlaceholder" placeholder="Claude APIキーを入力" style="background:var(--bg3); color:var(--text); border:1px solid var(--border); border-radius:7px; font-size:12.5px; font-family:inherit; outline:none;">
            <button class="dvt-api-test-btn" id="claudeTestBtn" data-i18n="apiKeyTest">テスト</button>
          </div>
        </div>
      </div>
      <div id="geminiSettings" style="display:none; margin-top: 8px;">
        <div class="lang-row">
          <span class="lang-label" data-i18n="geminiApiKeyLabel">APIキー</span>
          <div class="dvt-api-key-wrap">
            <input type="password" id="geminiApiKey" data-i18n-placeholder="geminiApiKeyPlaceholder" placeholder="Gemini APIキーを入力" style="background:var(--bg3); color:var(--text); border:1px solid var(--border); border-radius:7px; font-size:12.5px; font-family:inherit; outline:none;">
            <button class="dvt-api-test-btn" id="geminiTestBtn" data-i18n="apiKeyTest">テスト</button>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label" data-i18n="cacheSectionLabel">翻訳キャッシュ</div>
      <div class="cache-row">
        <span class="lang-label" aria-hidden="true">💾</span>
        <span id="cacheEntriesLabel" class="cache-entries" data-i18n="cacheLoading">読み込み中…</span>
        <button class="btn btn-secondary cache-clear-btn" id="btnClearCache" data-i18n="cacheClearBtn">キャッシュをクリア</button>
      </div>
      <div class="cache-hit-rates" id="cacheHitRates" style="display:none">
        <div class="cache-hit-rate-item">
          <span id="tcHitRateLabel"></span>
          <span class="cache-hit-rate-bar" aria-hidden="true"><span class="cache-hit-rate-fill" id="tcHitRateFill" style="width:0%"></span></span>
        </div>
        <div class="cache-hit-rate-item">
          <span id="scHitRateLabel"></span>
          <span class="cache-hit-rate-bar" aria-hidden="true"><span class="cache-hit-rate-fill" id="scHitRateFill" style="width:0%"></span></span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="info-box">
        <span data-i18n="selectionTip" data-i18n-html>選択翻訳：ページ上でテキストを選択すると、自動的に翻訳パネルが表示されます。</span><br>
        <span data-i18n="engineInfo" data-i18n-html>翻訳エンジン：Google 翻訳（無料）</span>
        <span id="shortcutInfoRow"><br><span data-i18n="shortcutInfo" data-i18n-html>ショートカット：Ctrl+Shift+T（ページ翻訳）/ Ctrl+Shift+Y（選択翻訳）/ Ctrl+Shift+R（領域選択）</span></span>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="popup-init.js"></script>
  <script src="popup.js"></script>
</body>
</html>
