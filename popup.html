<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DualView Translator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c18;
      --bg2: #14141f;
      --bg3: #1c1c2e;
      --border: rgba(255,255,255,0.08);
      --accent: #f5a623;
      --accent-dim: rgba(245,166,35,0.15);
      --text: #e8e8f0;
      --muted: rgba(232,232,240,0.5);
      --radius: 10px;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, 'Hiragino Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { color: #0c0c18; }

    .brand {
      flex: 1;
    }

    .brand-name {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    .brand-sub {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Section ── */
    .section {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    /* ── Language Selector ── */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lang-label {
      font-size: 11.5px;
      color: var(--muted);
      min-width: 42px;
    }

    select {
      flex: 1;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      appearance: auto;
    }

    select:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: var(--accent);
      color: #0c0c18;
    }

    .btn-primary:hover { background: #ffbb40; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }
    .btn-secondary:active { transform: scale(0.98); }

    .btn-active {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(245,166,35,0.3);
    }

    .btn-active:hover { background: rgba(245,166,35,0.22); }

    .btn + .btn { margin-top: 7px; }

    .btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Status ── */
    .status-bar {
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11.5px;
      color: var(--muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.active { background: #4caf50; }
    .status-dot.translating {
      background: var(--accent);
      animation: pulse 1s ease infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Info ── */
    .info-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.6;
    }

    .info-box strong { color: var(--text); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 3h14M12 3v3M3 9h8M3 9l3 3-3 3M15 9h6M15 13h6M15 17h6"/>
      </svg>
    </div>
    <div class="brand">
      <div class="brand-name">DualView Translator</div>
      <div class="brand-sub" data-i18n="brandSub">原文と翻訳を並べて表示</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label" data-i18n="uiLangLabel">表示言語</div>
    <div class="lang-row">
      <span class="lang-label">🌐</span>
      <select id="uiLang">
        <option value="ja">🇯🇵 日本語</option>
        <option value="en">🇺🇸 English</option>
        <option value="zh-CN">🇨🇳 中文（简体）</option>
        <option value="zh-TW">🇹🇼 中文（繁體）</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="es">🇪🇸 Español</option>
        <option value="pt">🇵🇹 Português</option>
        <option value="ru">🇷🇺 Русский</option>
        <option value="ar">🇸🇦 العربية</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-label" data-i18n="targetLangLabel">翻訳先の言語</div>
    <div class="lang-row">
      <span class="lang-label" data-i18n="targetLangTo">→ 翻訳先</span>
      <select id="targetLang">
        <option value="ja">🇯🇵 日本語</option>
        <option value="en">🇺🇸 English</option>
        <option value="zh-CN">🇨🇳 中文（簡体）</option>
        <option value="zh-TW">🇹🇼 中文（繁体）</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="es">🇪🇸 Español</option>
        <option value="pt">🇵🇹 Português</option>
        <option value="ru">🇷🇺 Русский</option>
        <option value="ar">🇸🇦 العربية</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-label" data-i18n="translateMode">翻訳モード</div>
    <button class="btn btn-primary" id="btnPage">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>
      <span data-i18n="translateFullPage">ページ全体を翻訳</span>
    </button>
    <button class="btn btn-secondary" id="btnRegion">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
      <span data-i18n="translateRegion">領域を選択して翻訳</span>
    </button>
    <button class="btn btn-secondary" id="btnUndo" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 109-9H3"/><path d="M3 3v6h6"/></svg>
      <span data-i18n="translateReset">翻訳をリセット</span>
    </button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText" data-i18n="statusDefault">テキストを選択して翻訳、またはモードを選択</span>
  </div>

  <div class="section">
    <div class="info-box">
      <span data-i18n="selectionTip" data-i18n-html>選択翻訳：ページ上でテキストを選択すると、自動的に翻訳パネルが表示されます。</span><br>
      <span data-i18n="engineInfo" data-i18n-html>翻訳エンジン：Google 翻訳（無料）</span>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
