  # ━━━━━ 長文段落の文ペア表示（#214） ━━━━━
  - id: sentence-pair-display
    title: 長文段落で原文と訳文を文単位でペア表示
    description: "長文段落で原文ブロックと訳文ブロックが視覚的に離れる問題（Issue #214）の改善検証"
    related_prs: [215]
    scenarios:
      - id: PAIR-001
        title: 3文以上の長文段落で文ペア表示になる
        priority: p1
        preconditions:
          - 拡張をインストール、翻訳エンジン設定済み
          - Wikipedia 等の長文段落（3文以上）を含むページを開く
        steps:
          - ポップアップから「ページ全体を翻訳」を実行
          - 長文段落（訳文 80 字以上、3文以上）を確認
        expected:
          - 原文ブロックと訳文ブロックではなく「原文文1→訳文1→原文文2→訳文2…」と交互に並ぶ
          - 各文ペアの間に明確な視覚的区切り（薄いオレンジの縦線）がある
          - 訳文文は原文文よりやや薄く・小さく表示される

      - id: PAIR-002
        title: 短い段落はペア表示にならない（従来通り）
        priority: p1
        preconditions:
          - 拡張をインストール、翻訳エンジン設定済み
        steps:
          - 短い段落（1-2文・訳文 80 字未満）を含むページで「ページ全体を翻訳」
        expected:
          - 原文の下に訳文ブロックがまとめて表示される（従来の単一ペア）
          - 文ごとの交互表示にはならない

      - id: PAIR-003
        title: インライン要素（リンク等）を含む段落はペア表示にしない
        priority: p2
        preconditions:
          - 段落内に `<a>` `<strong>` 等を含む長文ページを開く（例: ニュース記事本文）
        steps:
          - 「ページ全体を翻訳」を実行
        expected:
          - 当該段落は従来通り原文ブロック→訳文ブロックの単一ペア表示になる
          - リンクは原文ブロック内で機能する

      - id: PAIR-004
        title: 文数不一致時はフォールバック
        priority: p2
        description: "翻訳エンジンが原文の文を結合/分割して文数が変わったケース（自動テストではモックで再現済み、実 API での挙動確認）"
        steps:
          - 長文段落を翻訳し、ブラウザの DevTools で訳文の文数を観察
          - 文数が原文と一致しない段落を見つける
        expected:
          - 該当段落はペア表示にならず、単一ペアとして表示される
          - エラーや空ブロックは発生しない

      - id: PAIR-005
        title: 文ペア表示でも undo（×）ボタンが機能する
        priority: p1
        steps:
          - 文ペア表示になっている段落の訳文末尾の × ボタンをクリック
        expected:
          - 段落全体が元の DOM 構造に戻る（原文のみ表示）
          - '`.dvt-pair` / `.dvt-orig` / `.dvt-trans` がいずれも残らない'

      - id: PAIR-006
        title: iOS Share Extension で長文段落が文ペア表示になる
        priority: p1
        environment: safari-ios-sim
        related_prs: [220]
        preconditions:
          - DualView Translator の iOS Share Extension が有効化済み
        steps:
          - メモ.app などで 3 文以上を含む長文段落（合計 200 字程度の英語など）を選択
          - 共有シートから "DualView Translator" を選ぶ
        expected:
          - 翻訳結果が「原文文1→訳文1→原文文2→訳文2…」と文単位で交互表示される
          - 各文ペア間に薄いオレンジの左縦線が表示される
          - 短い段落や 1 文のみの段落は従来通り段落単位の単一ペアで表示される

      - id: PAIR-007
        title: macOS Share Extension でも文ペア表示が機能する
        priority: p1
        environment: safari-mac
        related_prs: [220]
        steps:
          - 任意のアプリ（Safari / メモ / メール等）で長文段落（3 文以上）を選択
          - 共有シートから "DualView Translator" を選ぶ
        expected:
          - WKWebView 内に文単位のペア表示が描画される
          - ダークモード / ライトモード切替で文ペアの縦線色が破綻しない

      - id: PAIR-008
        title: ペア表示時に外側の縦バーが原文行の左に見えない（回帰防止）
        priority: p1
        description: "PR #222 系で .dvt-trans に inline border-left を強制した結果、ペア表示時に外側の縦バーが原文（英語）行の左にも見えてしまった問題（Issue #228）の回帰防止"
        related_prs: [229]
        preconditions:
          - 拡張をインストール、翻訳エンジン設定済み
          - 3 文以上を含む長文段落のあるページ（例: 記事系サイト）を開く
        steps:
          - 「ページ全体を翻訳」を実行し、文ペア表示モードになる段落を確認
          - 原文（英語）行と訳文（日本語）行の左端を目視確認
        expected:
          - 原文行の左には縦バー「|」が見えない
          - 訳文行の左にのみ薄いオレンジの縦バーが見える
          - ブロック全体の左端に通しの縦バーが走らない

      - id: PAIR-009
        title: ペア表示時に翻訳の背景色が原文の裏に回り込まない（回帰防止）
        priority: p1
        description: "PR #222 系の外枠装飾が #228 のフォローでも残っていた背景色問題（Issue #230）の回帰防止"
        related_prs: [231]
        preconditions:
          - 拡張をインストール、翻訳エンジン設定済み
          - 3 文以上を含む長文段落のあるページを開く
        steps:
          - 「ページ全体を翻訳」を実行し、文ペア表示モードになる段落を確認
          - 原文（英語）行と訳文（日本語）行の背景を目視確認
        expected:
          - 原文（英語）行の裏には翻訳色の薄いオレンジ背景が回り込まない
          - 訳文（日本語）行の裏にのみ薄い翻訳色の背景が見える
          - 非ペア表示モードの段落では従来通り訳文ブロック全体に薄い翻訳色背景が出る

  # ━━━━━ 開発版識別バッジ（#216） ━━━━━
  - id: dev-version-badge
    title: 開発者モードロード時の dev バッジ表示
    description: "unpacked ロードした開発版とストア配信版を popup で識別できることの検証"
    related_prs: [217]
    scenarios:
      - id: DEV-001
        title: 開発者モードで読み込んだ拡張は popup に赤い dev バッジが表示される
        priority: p1
        preconditions:
          - "chrome://extensions （または about:debugging）で本リポジトリを unpacked ロード"
        steps:
          - 拡張アイコンをクリックして popup を開く
        expected:
          - 'ブランド名 "DualView Translator" の右、バージョン番号 (vX.Y.Z) のさらに右に赤い "dev" バッジが表示される'

      - id: DEV-002
        title: Chrome Web Store からインストールした拡張には dev バッジが表示されない
        priority: p1
        environment: chrome
        preconditions:
          - "Chrome Web Store 公開版からインストールされていること"
        steps:
          - 拡張アイコンをクリックして popup を開く
        expected:
          - dev バッジは表示されない（バージョン番号のみ）

      - id: DEV-003
        title: Firefox の一時アドオンとしてロードした場合も dev バッジが表示される
        priority: p2
        environment: firefox
        preconditions:
