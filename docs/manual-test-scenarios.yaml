  # ━━━━━ 設定のバックアップ（issue #206） ━━━━━
  - id: settings-backup
    title: 設定のエクスポート / インポート
    description: "issue #206 — popup の設定タブから JSON で設定をバックアップ／復元できる"
    related_prs: []
    scenarios:

      - id: BK-001
        title: APIキーを含めずにエクスポート（既定動作）
        priority: p0
        preconditions:
          - "API キーをいくつか設定済み（DeepL / Claude / Gemini のいずれか）"
          - "自動翻訳ルールを 1 件以上登録済み"
        steps:
          - ポップアップ → 設定タブ → 「設定のバックアップ」
          - "「APIキーを含める」チェックが OFF であることを確認"
          - "「エクスポート」ボタンをクリック"
          - ダウンロードされた JSON ファイルを開いて中身を確認
        expected:
          - "ファイル名が `dualview-translator-settings-YYYYMMDD.json` 形式"
          - "JSON に `format: \"dualview-translator-settings\"`, `version: 1`, `includesApiKeys: false` が含まれる"
          - "`data.targetLang` / `data.autoRules` / `data.uiLang` などが含まれる"
          - "`data.deeplApiKey` / `data.claudeApiKey` / `data.geminiApiKey` が含まれていない"
          - "`tc:*` / `sc:*` / `cacheHitStats` / `appleAvailable` が含まれていない"

      - id: BK-002
        title: APIキーを含めてエクスポート（opt-in）
        priority: p1
        preconditions:
          - API キーを設定済み
        steps:
          - "「APIキーを含める」チェックを ON にして「エクスポート」"
        expected:
          - "JSON に `includesApiKeys: true` が記録される"
          - "`data.deeplApiKey` などが平文で含まれる（漏洩リスクの説明ヒントがUIに表示されている）"

      - id: BK-003
        title: ファイル選択でインポートして設定が復元される（Chrome / Edge / Safari）
        priority: p0
        environment: chrome
        preconditions:
          - BK-001 でエクスポートしたJSONがある
        steps:
          - "翻訳先言語を別の値に変更、自動翻訳ルールを 1 件削除"
          - "ポップアップ → 設定タブ → 「ファイルから読み込む」ボタンをクリック"
          - エクスポートしたJSONファイルを選択
          - "テキストエリアにファイル内容が自動でセットされることを確認"
          - 「インポート」ボタンをクリック
        expected:
          - popup が閉じずにテキストエリアにJSON内容が表示される（Chrome系はファイル選択で popup が閉じない）
          - "ボタン下に緑のステータス「設定をインポートしました。」が表示される"
          - 自動翻訳ルール一覧・翻訳先言語などが復元される

      - id: BK-003b
        title: Firefox では貼り付けインポートで設定が復元される
        priority: p0
        environment: firefox
        description: "Firefox popup は file picker / alert / confirm を開くと閉じてしまうため、Firefox では「ファイルから読み込む」ボタンが非表示になり貼り付けのみ使える"
        preconditions:
          - BK-001 でエクスポートしたJSONがある
        steps:
          - "ポップアップ → 設定タブ → 「設定のインポート」セクションを確認"
          - 「ファイルから読み込む」ボタンが表示されていないことを確認
          - "翻訳先言語を別の値に変更、自動翻訳ルールを 1 件削除"
          - エクスポートしたJSONファイルをテキストエディタで開き、中身を全選択してコピー
          - "テキストエリアに貼り付け → 「インポート」"
          - Firefox を再起動して同じポップアップを開き直す
        expected:
          - 「ファイルから読み込む」ボタンは Firefox では非表示
          - "ボタン下に緑のステータス「設定をインポートしました。」が表示される"
          - ポップアップは閉じずに、その場でルール一覧・翻訳先言語などが復元される
          - Firefox 再起動後も復元された設定が保持されている

      - id: BK-004
        title: 不正なJSONを貼り付けた場合のエラーハンドリング
        priority: p1
        steps:
          - 「JSONを貼り付けてインポート」欄に空文字でインポート実行
          - 壊れた JSON / 別アプリの JSON を貼り付けてインポート実行
        expected:
          - "空のとき: ボタン下に赤のステータスで「JSON を貼り付け／選択するよう促す」内容が表示される（i18n: backupImportEmpty）"
          - "format 不一致 / JSON parse 失敗 / version 非互換のとき: 赤のステータスで「無効な設定データ」を意味する内容が表示される（i18n: backupImportInvalid）"
          - ステータス表示の間も popup は閉じない（alert/confirm を使わないこと）
          - 既存の設定は一切変更されない

      - id: BK-005
        title: 不明キーを含むJSONをインポートしてもセキュリティ的に安全
        priority: p2
        description: "悪意のあるJSONで `__proto__` や未知キーを注入されてもストレージに書き込まれないこと"
        steps:
          - "`{ \"format\": \"dualview-translator-settings\", \"data\": { \"__proto__\": {\"evil\": true}, \"malicious\": \"x\", \"targetLang\": \"en\" } }` を貼り付けてインポート"
        expected:
          - "`targetLang` のみが反映され、`__proto__` / `malicious` は無視される"
          - "Object.prototype が汚染されていない（DevTools で `({}).evil` が undefined）"

      - id: BK-006
        title: 11 言語すべてで設定タブの「設定のバックアップ」セクションが翻訳されている
        priority: p2
        steps:
          - UI 表示言語を 11 言語に順番に切り替えて設定タブを開く
        expected:
          - 各言語で「設定のバックアップ」「エクスポート」「インポート」「APIキーを含める」「ヒント文」が表示される
          - "未置換の `{` トークンや英語フォールバックが現れない"


  # ━━━━━ 端末間で設定を同期（issue #205） ━━━━━
  - id: settings-sync
    title: 端末間で設定を同期
    description: "issue #205 — chrome.storage.sync 経由でブラウザアカウントを使った端末間同期"
    related_prs: []
    scenarios:

      - id: SY-001
        title: 同期トグル ON で初回 push が動作
        priority: p0
        environment: chrome
        preconditions:
          - 翻訳先言語などを設定済み
          - クラウド側 (sync) には何も入っていない（Google アカウント新規 or 別端末で未使用）
        steps:
          - "設定タブ → 「端末間で同期」セクションの「端末間で同期する」を ON"
          - 同期ステータスを確認
        expected:
          - "緑のステータスに「同期しました」を意味するメッセージ + ロケール依存の日時表記（toLocaleString 由来）が表示される"
          - "DevTools で chrome.storage.sync.get(null) を見るとローカルの targetLang / autoRules 等が入っている"
          - "API キー (deeplApiKey 等) は sync 側に書かれていない"

      - id: SY-002
        title: クラウドに既存値があれば初回 ON でクラウド優先で合流
        priority: p0
        environment: chrome
        description: "別端末で先に同期 ON した後、別マシン or 別プロファイルで再 ON するシナリオ"
        preconditions:
          - "端末 A で同期 ON、autoRules: [rule-X] / targetLang: 'fr' を設定"
          - "端末 B で同期 OFF、autoRules: [rule-Y] / targetLang: 'ja' を保持"
        steps:
          - "端末 B で同期トグル ON"
        expected:
          - 端末 B のローカル設定がクラウド側 (rule-X / fr) で上書きされ、UI（ルール一覧・翻訳先セレクタ）が再描画される
          - 端末 B 独自の API キーや dvtTheme は変化しない

      - id: SY-003
        title: 他端末からのリアルタイム同期で UI が即時更新
        priority: p1
        environment: chrome
        preconditions:
          - 端末 A / B 両方で同期 ON
        steps:
          - 端末 A で翻訳先言語を ja → en に変更
          - 端末 B の popup を開く
        expected:
          - 端末 B でも翻訳先セレクタが en になっている（onChanged 経由）
          - autoRules を端末 A で追加すると端末 B のルール一覧にも即時反映

      - id: SY-004
        title: 同期トグル OFF でミラー停止
        priority: p1
        steps:
          - 同期 ON で sync 側に値が入っている状態
          - トグルを OFF
          - ローカルで autoRules を変更
        expected:
          - sync 側のデータは残置（chrome.storage.sync.get で残っている）
          - OFF 後のローカル変更は sync 側に反映されない（オフライン編集相当）
          - "ステータス表示が消える"

      - id: SY-005
        title: API キーは同期されない（漏洩防止）
        priority: p0
        description: "クラウド経由の API キー漏洩を防ぐ仕様"
        preconditions:
          - 端末 A / B 両方で同期 ON
        steps:
          - 端末 A で deeplApiKey に値を設定
          - 端末 B の popup を開く
        expected:
          - 端末 B の deeplApiKey は空のまま（同期されない）
          - chrome.storage.sync.get('deeplApiKey') で undefined

      - id: SY-006
        title: 容量制限超過時のエラー表示
        priority: p2
        description: "chrome.storage.sync の 8KB/item 制限を超えた autoRules でのエラーハンドリング"
        steps:
          - 同期 ON で autoRules に大量のルールを追加（8KB 超まで）
        expected:
          - 赤のステータスで「同期エラー: QUOTA_BYTES_PER_ITEM」が表示される
          - ローカル設定は保持される（autoRules はそのまま使える）

      - id: SY-007
        title: sync 非対応 / 未ログイン環境のフォールバック
        priority: p1
        environment: safari-mac
        description: "Safari など chrome.storage.sync が動作しない / アカウント未ログインのケース"
        steps:
          - 同期トグルを ON
        expected:
          - "エラーステータス「このブラウザは sync ストレージに対応していません」または同期エラー"
          - トグルが自動で OFF に戻る
          - ローカル設定は変化しない

