          - フルパネルが二重に開かれない

      - id: SMI-006
        title: 画面右端での選択ではみ出さない
        priority: p1
        steps:
          - 画面右端にあるテキストをドラッグ選択
        expected:
          - ミニアイコンが画面外（横スクロール領域）にはみ出さず、ビューポート内に収まる

      - id: SMI-007
        title: "右クリック→「DualView: 翻訳」は従来通り直接フルパネル"
        priority: p0
        steps:
          - テキストを選択
          - "そのまま右クリック → コンテキストメニューの「DualView: 翻訳」を選ぶ"
        expected:
          - ミニアイコンを介さず、フローティング翻訳パネルが直接開く
          - 翻訳が即座に開始される

      - id: SMI-008
        title: ショートカット Ctrl+Shift+Y は従来通り直接フルパネル
        priority: p0
        steps:
          - テキストを選択した状態で Ctrl+Shift+Y（macOS は Cmd+Shift+Y）を押す
        expected:
          - ミニアイコンを経由せずフルパネルが開く

      - id: SMI-009
        title: ライト／ダークテーマ両方で視認できる
        priority: p1
        description: ミニアイコンは両テーマで共通の白背景 + 軽いシャドウのデザイン。背景色の濃淡に関係なくシャドウで浮き上がって見えることを確認する
        steps:
          - OS 設定でダークモードのページにて選択 → アイコンを目視
          - OS 設定でライトモードに切り替えてから別ページで選択 → アイコンを目視
        expected:
          - どちらのモードでも白背景の角丸正方形ボタンがシャドウとともに表示され、視認できる

      - id: SMI-010
        title: aria-label / title が UI 言語に追従する
        priority: p2
        environment: chrome
        steps:
          - ポップアップの「設定」タブから UI 言語を「English」に変更
          - 任意のページでテキストを選択してミニアイコンを表示
          - 'DevTools でアイコン要素の `aria-label` を確認'
        expected:
          - '`aria-label` および `title` 属性が選択言語の文言（例: 英語の場合 "Translate selection"）になっている'

      - id: SMI-011
        title: ミニアイコン表示後にスクロールしてもパネルが正しい位置に開く
        priority: p1
        description: クリック時に Range から rect を再取得する実装の検証（PR #102 のレビュー指摘の回帰防止）
        steps:
          - 縦に長いページで、画面中央付近のテキストを選択してミニアイコンを表示
          - そのままマウスホイール / トラックパッドでページを下方向にスクロール
          - 表示されたままのミニアイコンをクリック
        expected:
          - フルパネルが選択範囲の現在位置（スクロール後の見える位置）の近傍に開く
          - 古い座標のままビューポート外に開いてしまわない

      - id: SMI-012
        title: prefers-reduced-motion 有効時にアニメーションが抑制される
        priority: p1
        environment: chrome
        steps:
          - OS の「視差効果を減らす」「アニメーションを減らす」設定を有効化（macOS: システム設定 → アクセシビリティ → 表示 → 視差効果を減らす）
          - ブラウザを再起動してから任意のページでテキストを選択
        expected:
          - ミニアイコンが scale アニメーションなしで即座に表示される
          - ホバーしてもボタンが拡大しない

      - id: SMI-013
        title: デスクトップでキーボード選択（Shift + 矢印キー）してもミニアイコンは出ない
        priority: p2
        environment: chrome
        description: "#127 で selectionchange 経路を追加した際、タッチデバイス限定で登録するようゲートして本シナリオの仕様（デスクトップでキーボード選択ではアイコン非表示）を維持している"
        steps:
          - 任意のページにフォーカスを当てる
          - キャレットを置いてから Shift + → / Shift + Ctrl + → でテキスト選択
        expected:
          - ミニアイコンは表示されない（仕様通り）
          - 代わりに `Ctrl+Shift+Y`（macOS は `Cmd+Shift+Y`）で選択翻訳パネルを直接開ける

      - id: SMI-014
        title: フォーカスリングが :focus-visible で表示される
        priority: p2
        environment: chrome
        steps:
          - テキストを選択してミニアイコンを表示
          - キーボードの Tab キーでフォーカスをミニアイコンに合わせる
        expected:
          - 青色（`#1a73e8`）のアウトラインがアイコン外周に表示される
          - マウスクリックではフォーカスリングは出ない（:focus-visible の意図通り）

      - id: SMI-015
        title: iOS Safari でテキスト選択するとミニアイコンが表示される
        priority: p0
        environment: safari-ios-real
        description: "#127 で iOS Safari でアイコンが出ない問題に対応した回帰防止項目。selectionchange + 300ms デバウンスで動作"
        steps:
          - iOS Safari で拡張を有効化したまま任意の Web ページを開く
          - 段落のテキストを長押し選択（範囲ハンドルでも調整 OK）
          - 指を離してから 0.5 秒程度待つ
        expected:
          - 選択範囲の右下隣あたりに白角丸の 🌐 ミニアイコンが表示される
          - フルパネルは即座には開かない
          - アイコンをタップすると翻訳パネルが展開する

      - id: SMI-016
        title: iOS Safari でフルパネル表示中にテキスト再選択しても二重に開かない
        priority: p1
        environment: safari-ios-real
        steps:
          - SMI-015 の手順でミニアイコン → タップでフルパネルを開く
          - パネルを閉じずにページの別のテキストを選択
        expected:
          - パネル内のテキスト選択は無視される
          - パネル外のテキスト選択時は新しいミニアイコンは出ない（現在のフルパネルが優先）
          - パネルを閉じてから再選択するとミニアイコンが出る

  # ━━━━━ N+1. 要約ブロックの個別 undo（#134） ━━━━━
  - id: summary-undo
    title: 領域選択翻訳・右クリック翻訳の要約 × ボタンと全体リセット
    description: "#134 で要約ブロックに × ボタンを追加し、ポップアップ「翻訳をリセット」でも領域選択時の要約が消えるようにした"
    related_prs: [134]
    scenarios:

      - id: SU-001
        title: 領域選択（翻訳＆要約）後に要約 × で要約だけ消える
        priority: p0
        steps:
          - ポップアップから「領域を選択して翻訳＆要約」を実行
          - 任意のブロック要素をクリックして翻訳＋要約を実行
          - 要約ブロックの右上 × ボタンをクリック
        expected:
          - 要約ブロックだけが remove される
          - 翻訳結果（各 dvt-trans）はそのまま残る

      - id: SU-002
        title: ポップアップ「翻訳をリセット」で領域翻訳の要約も消える
        priority: p0
        description: "過去のバグ（領域選択時の .dvt-summary が ID 不一致で undoPageTranslate に拾われない）の回帰防止"
        steps:
          - SU-001 と同じ手順で要約まで実行
          - ポップアップを開いて「翻訳をリセット」をクリック
        expected:
          - 翻訳要素が原文に戻る
          - 要約ブロックも消える（過去はここが残っていた）

      - id: SU-003
        title: 要約ブロック × ボタンのホバー演出
        priority: p2
        steps:
          - 要約ブロックにマウスホバー → × ボタンの opacity が増す
          - × ボタン自体にホバー → 赤系背景になる
        expected:
          - 透明度遷移がスムーズで違和感なし

  # ━━━━━ N+2. 翻訳結果と原文が完全一致するときの非表示（#138） ━━━━━
  - id: identical-translation-skip
    title: 翻訳結果が原文と完全一致するときは翻訳ブロックを表示しない
    description: "#138 で記号・数字のみ・URL などで翻訳しても変わらないテキストの翻訳ブロックを撤去するようにした"
    related_prs: [138]
    scenarios:

      - id: ITS-001
        title: 記号列のみの段落で翻訳ブロックが出ない
        priority: p1
        steps:
          - "テキストに `>***********` のような記号列のみを含む段落がある任意ページを開く"
          - ポップアップから「ページ全体を翻訳」を実行
        expected:
          - 該当段落には翻訳ブロック（.dvt-trans）が挿入されない
          - 他の通常テキストは普通に翻訳される

      - id: ITS-002
        title: URL のみの段落で翻訳ブロックが出ない
        priority: p2
        steps:
          - "`https://example.com/foo` のような URL のみの段落があるページで翻訳実行"
        expected:
          - 該当段落には翻訳ブロックが挿入されない

      - id: ITS-003
        title: 領域選択翻訳でも同様に動作する
        priority: p1
        steps:
          - 記号列を含むブロック要素を「領域を選択して翻訳」で対象にする
        expected:
          - 該当ブロック内の記号のみ段落は翻訳ブロックなしで残り、通常テキストには翻訳が付く

      - id: ITS-004
        title: 選択翻訳パネルでは原文と一致してもメッセージが出る（既存挙動維持）
        priority: p2
        description: 明示トリガーの選択翻訳はユーザーが結果を見たいケースなので、文字列一致時の非表示は適用しない
        steps:
          - "`>***********` のような記号列を選択 → ミニアイコン → クリックで翻訳"
        expected:
          - 翻訳パネルに何らかの結果（同じ記号列）が表示される（または同一言語メッセージ）
          - パネル自体は閉じられない
