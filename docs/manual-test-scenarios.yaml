          - App Group の各キーが空でない

      - id: SEM-004
        title: 想定外キーは App Group に書き込まれない（allowlist）
        priority: p1
        description: "PR #183 Copilot レビュー対応。Swift 側の mirrorAllowedKeys で防御している"
        steps:
