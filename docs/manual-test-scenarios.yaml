  # ━━━━━ line-clamp 上書き（#221） ━━━━━
  - id: line-clamp-override
    title: 領域選択翻訳時にホストページの line-clamp / max-height を一時解除
    description: "Reddit など投稿本文を truncation するサイトで翻訳挿入により原文後半が隠れる問題（#221）の回帰防止"
    related_prs: [222]
    scenarios:
      - id: LC-001
        title: Reddit の長文投稿で領域選択翻訳しても原文後半が clamp で隠れない
        priority: p1
        environment: firefox
        preconditions:
          - "DeepL API キー設定済み・翻訳エンジン=DeepL"
          - "https://www.reddit.com/r/PorscheMacan/ などで本文が複数文ある長文投稿を開く"
        steps:
          - 領域選択翻訳モードを起動し、投稿本文をクリックして翻訳する
        expected:
          - 訳文ブロック挿入後も原文（英語）全文が読める
          - 末尾に "After..." のような原文の途中で見切れる箇所が出ない
          - undo ボタン (×) で訳文を取り消すと、Reddit の元の clamp 状態が完全に復元される（"see more" の見え方が元通り）

      - id: LC-002
        title: 同一の clamp 祖先内で複数段落を翻訳しても、全部 undo するまで clamp が解除されたまま
        priority: p2
        environment: chrome
        preconditions:
          - "max-height + overflow:hidden を持つ祖先内に複数の翻訳可能な要素があるページ"
        steps:
          - 領域選択モードで段落 A を翻訳
          - 続けて領域選択モードで段落 B を翻訳
          - 段落 A の undo (×) を押す
          - 段落 B の undo (×) を押す
        expected:
          - 段落 A だけ undo した時点では clamp は解除されたまま（B の訳文が clamp で隠れない）
          - 段落 B も undo すると祖先の元の clamp / max-height / overflow が復元される

  # ━━━━━ 選択翻訳の文ペア表示（#233 / PR #236） ━━━━━
  - id: selection-paired-display
    title: 選択翻訳パネルの文ペア表示
    description: "Issue #233 で選択翻訳パネルもページ翻訳と同じ条件で文ペア表示に対応した（PR #236）"
    related_prs: [236]
    scenarios:
      - id: SPP-001
        title: 長文を選択翻訳すると文ペア表示になり原文プレビューが消える
        priority: p1
        preconditions:
          - 英語 → 日本語の翻訳設定
          - "2 文以上で訳文が 80 字以上になるような英語段落（例: ニュース記事のリード文）を含むページ"
        steps:
          - 該当の段落（2 文以上）をテキスト選択する
          - ミニアイコンをクリックしてパネルを開き、翻訳を実行する
        expected:
          - 翻訳結果エリア内に「原文1→訳1→原文2→訳2…」が交互に並んで表示される
          - パネル冒頭の原文プレビュー欄（最大 60 字省略表示）は非表示になっている
          - 訳文行（`.dvt-pair-trans`）の左に薄い縦バーが付き、原文行と視覚的に区別される

      - id: SPP-002
        title: 短文選択は従来通り単一表示（原文プレビュー表示）
        priority: p1
        steps:
          - '"Hello world" など 1 文の短いテキストを選択する'
          - ミニアイコンをクリックしてパネルを開き、翻訳を実行する
        expected:
          - 訳文エリアには訳文が単一テキストとして表示される
          - パネル冒頭の原文プレビュー欄も表示される
          - '`.dvt-pair` クラスを持つ要素は生成されない'

      - id: SPP-003
        title: 文ペア表示中の読み上げは訳文のみ
        priority: p2
        preconditions:
          - Web Speech API が利用可能なブラウザ（Chrome / Safari）
        steps:
          - SPP-001 と同じ手順でペア表示状態にする
          - パネルの 🔊 読み上げボタンをクリックする
        expected:
          - 読み上げ対象は訳文部分（`.dvt-pair-trans` の連結）のみで、原文は読み上げられない

      - id: SPP-004
        title: 再翻訳で文数が変わってもレイアウトが正しく切り替わる
        priority: p2
        steps:
          - SPP-001 と同じ長文を選択し翻訳実行（ペア表示になる）
          - パネルの翻訳先言語を別言語に切り替えて再翻訳
          - 再翻訳結果の訳文の文数が原文と一致しない場合 → 単一表示にフォールバック
          - 再度元の言語に戻して再翻訳 → 再びペア表示に戻る
        expected:
          - フォールバック時は原文プレビューが再表示される
          - ペア表示復帰時は原文プレビューが再び非表示になる

  # ━━━━━ ピン留め誘導（ウェルカムページ + ポップアップバナー） ━━━━━
  - id: pin-onboarding
    title: ツールバーへのピン留め誘導
    description: "Issue #244 / PR #245 で追加。初回インストール時のウェルカムページと、未ピン留め時のポップアップバナー"
    related_prs: [245]
    scenarios:

      - id: PO-001
        title: 初回インストール時にウェルカムページが開く
        priority: p1
        environment: chrome
        preconditions:
          - 拡張が未インストールの状態
        steps:
          - 拡張を新規インストール（ストアまたは未パッケージ読み込み）する
        expected:
          - インストール直後に新規タブで welcome.html が開く
          - ピン留め手順（パズルピース → ピンアイコン）が現在のUI言語で表示される
          - 拡張のアップデート時（reason=update）には開かない

      - id: PO-002
        title: ウェルカムページのピン留め済み表示
        priority: p2
        environment: chrome
        preconditions:
          - 拡張をツールバーにピン留め済み
        steps:
          - welcome.html を直接開く（または再インストール後にピン留めしてから再表示）
        expected:
          - 「ピン留め済み」の完了メッセージが表示される
          - ピン留め手順カードは非表示になる

      - id: PO-003
        title: 未ピン留め時にポップアップ上部へ誘導バナーが出る
        priority: p1
        environment: chrome
        preconditions:
          - 拡張をツールバーにピン留めしていない状態
        steps:
          - パズルピースメニューから拡張のポップアップを開く
        expected:
          - ポップアップ上部にピン留め誘導バナーが表示される
          - バナー文言が現在のUI言語で表示される

      - id: PO-004
        title: バナーを閉じると次回以降は表示されない
        priority: p2
        environment: chrome
        preconditions:
          - PO-003 のバナーが表示されている
        steps:
          - バナー右端の × ボタンをクリックする
          - ポップアップを閉じて再度開く
        expected:
          - クリック直後にバナーが消える
          - 再オープン後もバナーは表示されない（pinBannerDismissed が永続化される）

      - id: PO-005
        title: ピン留め済みならバナーを出さない
        priority: p2
        environment: chrome
        preconditions:
          - 拡張をツールバーにピン留め済み
        steps:
          - ツールバーのアイコンからポップアップを開く
        expected:
          - 誘導バナーは表示されない

      - id: PO-006
        title: getUserSettings 非対応環境では回数上限まで表示して止まる
        priority: p1
        environment: safari-mac
        related_prs: [247]
        description: "chrome.action.getUserSettings 非対応の Firefox / Safari でも誘導バナーを出すが、永続的に居座らないこと（#247）"
        preconditions:
          - getUserSettings 非対応のブラウザ（古い Firefox / Safari Web Extension 等）
          - pinBannerDismissed / pinBannerShownCount が未設定の初期状態
        steps:
          - ポップアップを開く操作を 4 回繰り返す
        expected:
          - 1〜3 回目はバナーが表示される
          - 4 回目以降はバナーが表示されない（pinBannerShownCount が上限 3 に到達）
          - エラーやレイアウト崩れが起きない

      - id: PO-007
        title: 非対応環境でも × ボタンで即・永続非表示にできる
        priority: p2
        environment: safari-mac
        related_prs: [247]
        preconditions:
          - getUserSettings 非対応のブラウザでバナーが表示されている
        steps:
          - バナー右端の × ボタンをクリックする
          - ポップアップを閉じて再度開く
        expected:
          - クリック直後にバナーが消える
          - 再オープン後も表示されない（pinBannerDismissed が永続化され、回数上限に関係なく出ない）
