        expected:
          - 選択範囲の右下隣に 36px の青背景・角丸正方形のミニ翻訳ボタン（中央に地球儀の絵文字 🌐）が表示される
          - フルサイズの翻訳パネル（言語セレクタ・翻訳ボタン・結果欄を含むもの）は表示されない

      - id: SMI-002
        title: ミニアイコンクリックでフルパネルが展開し即翻訳が開始される
        priority: p0
